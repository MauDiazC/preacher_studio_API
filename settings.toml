[project]
name = "preacher-studio-backend"
version = "0.1.0"
description = "Backend para la gestión de sermones con IA y persistencia en tiempo real"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "google-generativeai>=0.3.2",
    "supabase>=2.3.7",
    "pydantic>=2.6.1",
    "pydantic-settings>=2.1.0",
    "python-jose[cryptography]>=3.3.0",
    "argon2-cffi>=23.1.0",
    "dynaconf>=3.2.4",
    "rich>=13.7.0",
    "typer>=0.9.0",
    "python-multipart>=0.0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "httpx>=0.26.0",
]